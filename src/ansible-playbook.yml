- hosts: worker
  become: true
  tasks:

  - name: Install Docker
    apt:
      name: docker.io
      state: present
      update_cache: yes

  - name: Start Docker Service
    service:
      name: docker
      state: started

  - name: Copy project files to worker node
    copy:
      src: .
      dest: /home/ubuntu/app

  - name: Build Docker Image
    command: docker build -t premsagar200415/devops-project /home/ubuntu/app
